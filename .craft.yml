minVersion: '2.21.0'

changelog:
  policy: auto

targets:
  - name: npm
    id: '@sentry/scrapbook'
    includeNames: /^sentry-scrapbook-\d.*\.tgz$/
    access: public
  - name: npm
    id: '@sentry/scrapbook-jest'
    includeNames: /^sentry-scrapbook-jest-\d.*\.tgz$/
    access: public
  - name: npm
    id: '@sentry/scrapbook-vitest'
    includeNames: /^sentry-scrapbook-vitest-\d.*\.tgz$/
    access: public
  - name: github
    tagPrefix: v
